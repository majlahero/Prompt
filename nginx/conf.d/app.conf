# Cấu hình đầy đủ: HTTP -> redirect HTTPS, HTTPS -> proxy vào app.
# CHỈ dùng file này SAU KHI đã có cert (chạy init-letsencrypt trước).
# Trước khi có cert, dùng bootstrap.conf.disabled (đổi tên thành .conf).

server {
    listen 80;
    listen [::]:80;
    server_name trochoi.id.vn www.trochoi.id.vn;

    # ACME challenge cho certbot renew
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Mọi request còn lại -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name trochoi.id.vn www.trochoi.id.vn;

    ssl_certificate     /etc/letsencrypt/live/trochoi.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trochoi.id.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Bảo mật cơ bản
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2m;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
