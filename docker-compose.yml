services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pha-prompt:latest
    container_name: pha-prompt-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
      # Chat sẽ chạy mock nếu không set OPENAI_API_KEY. Điền vào .env để dùng LLM thật.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # NextAuth (nếu bật auth sau này)
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTH_URL=${AUTH_URL:-https://trochoi.id.vn}
    volumes:
      - db-data:/data
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: pha-prompt-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - web

  # Chạy 1 lần để xin/renew cert. Xem DEPLOY.md.
  certbot:
    image: certbot/certbot:latest
    container_name: pha-prompt-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - web

volumes:
  db-data:

networks:
  web:
    driver: bridge
