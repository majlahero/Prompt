services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pha-prompt:latest
    container_name: pha-prompt-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
      # Chat sẽ chạy mock nếu không set OPENAI_API_KEY. Điền vào .env để dùng LLM thật.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # NextAuth (nếu bật auth sau này)
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTH_URL=${AUTH_URL:-https://trochoi.id.vn}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
    volumes:
      - db-data:/data
    expose:
      - "3000"
    # Cho phép container gọi tới dịch vụ chạy trên host (vd: 9router ở localhost:20128).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: pha-prompt-tunnel
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    # Cho phép cloudflared gọi ngược về webhook listener chạy trên host (auto-deploy).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web

volumes:
  db-data:

networks:
  web:
    driver: bridge
